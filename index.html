<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspeção de Campo</title>

<style>
    :root{
        --energisa-blue:#0097CE;
        --energisa-blue-dark:#0079A8;
        --energisa-green:#00843D;
        --bg:#F3F5F7;
        --border:#D9E0E6;
        --text:#333;
        --danger:#D32F2F;
    }

    *{
        box-sizing:border-box;
    }

    body{
        font-family:Arial, Helvetica, sans-serif;
        background:var(--bg);
        margin:0;
        padding:20px;
        color:var(--text);
    }

    .container{
        max-width:1400px;
        margin:auto;
    }

    .header{
        background: linear-gradient(135deg, var(--energisa-blue), var(--energisa-blue-dark));
        color:white;
        padding:20px 30px;
        border-radius:12px;
        margin-bottom:25px;
        box-shadow:0 4px 15px rgba(0,0,0,.15);
    }

    .header h1{
        margin:0;
        font-size:28px;
    }

    .header span{
        opacity:.9;
        font-size:14px;
    }

    .card{
        background:white;
        border-radius:12px;
        margin-bottom:20px;
        overflow:hidden;
        box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .card-title{
        background:var(--energisa-blue);
        color:white;
        padding:15px 20px;
        font-size:18px;
        font-weight:bold;
    }

    .card-body{
        padding:20px;
    }

    .grid{
        display:grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap:16px;
    }

    label{
        display:block;
        font-weight:600;
        margin-top:15px;
        margin-bottom:6px;
    }

    input[type=text],
    input[type=date],
    select,
    textarea{
        width:100%;
        padding:12px;
        border:1px solid var(--border);
        border-radius:8px;
        font-size:14px;
    }

    input:focus,
    select:focus,
    textarea:focus{
        outline:none;
        border-color:var(--energisa-blue);
        box-shadow:0 0 0 3px rgba(0,151,206,.15);
    }

    .radio-group{
        display:flex;
        gap:40px;
        flex-wrap:wrap;
        margin-top:10px;
    }

    .radio-group label{
        display:flex;
        align-items:center;
        gap:8px;
        cursor:pointer;
        font-weight:normal;
        margin:0;
    }

    .table-container{
        overflow:auto;
        width:100%;
    }

    table{
        width:100%;
        border-collapse:collapse;
        min-width:800px;
    }

    thead{
        position:sticky;
        top:0;
        z-index:10;
    }

    th{
        background:var(--energisa-blue);
        color:white;
        padding:14px;
        text-align:center;
        font-size:14px;
    }

    td{
        padding:12px;
        border-bottom:1px solid #eee;
        text-align:center;
        vertical-align:middle;
    }

    td:first-child{
        text-align:left;
    }

    tbody tr:nth-child(odd){
        background:#FAFAFA;
    }

    tbody tr:hover{
        background:#F0F8FC;
    }

    input[type=radio]{
        width:22px;
        height:22px;
        accent-color:var(--energisa-green);
        transform:scale(1.1);
        cursor:pointer;
    }

    .naoConformeBox{
        display:none;
        background:#FFF5F5 !important;
    }

    .naoConformeContent{
        padding:20px;
        border-left:5px solid var(--danger);
        text-align:left;
    }

    .naoConformeContent strong{
        color:var(--danger);
    }

    input[type=file]{
        margin-top:10px;
    }

    textarea{
        min-height:90px;
        margin-top:10px;
        resize:vertical;
    }

    .hidden{
        display:none;
    }

    .btn-container{
        text-align:center;
        margin-top:30px;
    }

    button{
        background:var(--energisa-blue);
        color:white;
        border:none;
        border-radius:10px;
        padding:15px 40px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:.3s;
    }

    button:hover{
        background:var(--energisa-blue-dark);
        transform:translateY(-2px);
        box-shadow:0 4px 12px rgba(0,0,0,.15);
    }

    button:disabled{
        opacity:.7;
        cursor:not-allowed;
        transform:none;
        box-shadow:none;
    }

    .required{
        color:red;
    }

    h2{
        margin:0 0 16px 0;
        font-size:20px;
    }

    .status{
        display:none;
        margin-top:16px;
        padding:12px 14px;
        border-radius:10px;
        font-size:14px;
        font-weight:bold;
    }

    .status.ok{
        display:block;
        background:#ecfdf5;
        color:#166534;
        border:1px solid #bbf7d0;
    }

    .status.erro{
        display:block;
        background:#fef2f2;
        color:#991b1b;
        border:1px solid #fecaca;
    }

    .status.info{
        display:block;
        background:#eef6fb;
        color:#0f4c5c;
        border:1px solid rgba(0,151,206,.18);
    }

    @media(max-width:768px){
        body{
            padding:10px;
        }

        .header h1{
            font-size:22px;
        }

        .grid{
            grid-template-columns:1fr;
        }

        .radio-group{
            flex-direction:column;
            gap:15px;
        }

        button{
            width:100%;
        }

        th, td{
            padding:8px;
            font-size:12px;
        }
    }/* ===== NOVO VISUAL DOS ITENS ===== */
.checklist-mobile{
    display:grid;
    gap:18px;
}

.item-card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.04);
}

.item-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:14px;
    color:#222;
    line-height:1.35;
}

.opcoes-grid{
    display:grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap:12px;
}

.opcao-btn input[type=radio]{
    display:none;
}

.opcao-btn label{
    margin:0;
    min-height:78px;
    border:2px solid #d9d9d9;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:12px 10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    background:#fff;
    transition:.2s ease;
    line-height:1.25;
}

.opcao-btn label:hover{
    border-color:var(--energisa-blue);
    background:#f5fbfe;
}

.opcao-btn input[type=radio]:checked + label{
    border-color:var(--energisa-blue);
    background:#e6f7fd;
    color:#005a7c;
    box-shadow:0 0 0 3px rgba(0,151,206,.12);
}

.opcao-btn.conforme input[type=radio]:checked + label{
    border-color:var(--energisa-green);
    background:#ebfff3;
    color:#006b31;
}

.opcao-btn.nao-conforme input[type=radio]:checked + label{
    border-color:var(--danger);
    background:#fff1f1;
    color:#b42318;
}

.opcao-btn.falta input[type=radio]:checked + label{
    border-color:#d97706;
    background:#fff7ed;
    color:#b45309;
}

.opcao-btn.na input[type=radio]:checked + label{
    border-color:#6b7280;
    background:#f3f4f6;
    color:#374151;
}

.naoConformeBox{
    display:none;
    margin-top:12px;
    background:#FFF5F5;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #fecaca;
}

.naoConformeContent{
    padding:18px;
    border-left:5px solid var(--danger);
    text-align:left;
}

.naoConformeContent strong{
    color:var(--danger);
}

/* esconder tabela antiga se quiser migrar totalmente */
.checklist-tabela{
    display:none;
}

/* RESPONSIVIDADE */
@media (max-width: 900px){
    .opcoes-grid{
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }
}

@media (max-width: 520px){
    .item-card{
        padding:14px;
    }

    .item-title{
        font-size:16px;
    }

    .opcoes-grid{
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap:10px;
    }

    .opcao-btn label{
        min-height:72px;
        font-size:15px;
        padding:10px 8px;
    }
}
.grupo-linha td{
    background:#eaf6fb !important;
    color:#005b7f;
    font-weight:bold;
    text-align:left !important;
    font-size:15px;
    padding:14px 12px;
    border-top:2px solid #cfeaf5;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Inspeção de Campo</h1>
        <span>Checklist Operacional • Segurança • Veículos • EPI/EPC</span>
    </div>

    <!-- DADOS DA INSPEÇÃO -->
    <div class="card">
        <div class="card-title">
            Dados da Inspeção
        </div>

        <div class="card-body">
            <div class="grid">
                <div>
                    <label for="dataInspecao">Data da Inspeção <span class="required">*</span></label>
                    <input type="date" id="dataInspecao">
                </div>

                <div>
                    <label for="resp1">RESPONSÁVEL 01 PELA AÇÃO <span class="required">*</span></label>
                    <input type="text" id="resp1">
                </div>

                <div>
                    <label for="mat1">MATRÍCULA RESPONSÁVEL 01 <span class="required">*</span></label>
                    <input type="text" id="mat1">
                </div>

                <div>
                    <label for="resp2">RESPONSÁVEL 02 PELA AÇÃO</label>
                    <input type="text" id="resp2">
                </div>

                <div>
                    <label for="mat2">MATRÍCULA RESPONSÁVEL 02</label>
                    <input type="text" id="mat2">
                </div>
            </div>
        </div>
    </div>

    <!-- TIPO DE INSPEÇÃO -->
    <div class="card">
        <div class="card-title">
            Tipo de Inspeção
        </div>

        <div class="card-body">
            <div class="radio-group">
                <label>
                    <input type="radio" name="tipo" value="epi">
                    EPI / EPC
                </label>

                <label>
                    <input type="radio" name="tipo" value="viatura">
                    Viatura
                </label>
            </div>
        </div>
    </div>

    <!-- COLABORADORES INSPECIONADOS -->
    <div class="card hidden" id="secaoColaboradores">
        <div class="card-title">
            Colaboradores Inspecionados
        </div>

        <div class="card-body">
            <div class="grid">
                <div>
                    <label for="matColab1">Matrícula do Colaborador 01 <span class="required">*</span></label>
                    <input type="text" id="matColab1" placeholder="Digite a matrícula do colaborador 01">
                </div>

                <div>
                    <label for="matColab2">Matrícula do Colaborador 02</label>
                    <input type="text" id="matColab2" placeholder="Digite a matrícula do colaborador 02">
                </div>
            </div>
        </div>
    </div>

    <!-- DADOS DO VEÍCULO -->
    <div class="card hidden" id="secaoVeiculo">
        <div class="card-title">
            Dados do Veículo
        </div>

        <div class="card-body">
            <div class="grid">
                <div>
                    <label for="placaVeiculo">Placa do Veículo</label>
                    <input
                        type="text"
                        id="placaVeiculo"
                        maxlength="7"
                        placeholder="ABC1D23"
                    >
                </div>

                <div>
                    <label for="tipoVeiculo">Tipo do Veículo</label>

                    <select id="tipoVeiculo">
                        <option value="">Selecione...</option>
                        <option value="simples">Caminhonete Simples</option>
                        <option value="escada">Caminhonete Escada Central</option>
                        <option value="cesto">Caminhão Cesto Aéreo</option>
                        <option value="passeio">Carro Passeio / Motocicleta</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="card hidden" id="checklistVeiculo">
    <div class="card-title" id="tituloVeiculo">
        Checklist do Veículo
    </div>

    <div class="card-body">
        <div id="listaVeiculo" class="checklist-mobile"></div>
    </div>
</div>

   <div class="card hidden" id="secaoEPC">
    
<div class="card-title">
    EPI / EPC
</div>


    <div class="card-body">
        <div id="listaItens" class="checklist-mobile"></div>
    </div>
</div>

    

    <div class="btn-container">
        <button type="button" id="btnSalvar">
            Salvar Inspeção
        </button>

        <div id="status" class="status"></div>
    </div>

</div>

<script>
const API = "https://forms.pedro-fillype.workers.dev";

const itensEPI = [
    'Botina Impermeável',

const itensEPC = [

const veiculos = {
    simples: [
        'Buzina',
        'Chave de Roda',
        'Luz de Ré',
        'Luz de Freio',
        'Setas',
        'Farol',
        'Pneu de Estepe',
        'Freio de Mão',
        'Limpador de Para-brisa',
        'Esguicho',
        'Macaco',
        'Pneus',
        'Retrovisores',
        'Triângulo de Sinalização',
        'Rádio VHF',
        'Calços p/ Pneus'
    ],

    escada: [
        'Buzina',
        'Luz de Ré',
        'Luz de Freio',
        'Setas',
        'Farol',
        'Pneu de Estepe',
        'Freio de Mão',
        'Limpador de Para-brisa',
        'Esguicho',
        'Macaco',
        'Pneus',
        'Retrovisores',
        'Triângulo de Sinalização',
        'Rádio VHF',
        'Condições da Escada Central',
        'Mangueiras da Escada',
        'Calços p/ Pneus',
        'Calços p/ Patolas',
        'Patolas'
    ],

    cesto: [
        'Buzina',
        'Luz de Ré',
        'Luz de Freio',
        'Setas',
        'Farol',
        'Pneu de Estepe',
        'Freio de Mão',
        'Limpador de Para-brisa',
        'Esguicho',
        'Macaco',
        'Pneus',
        'Retrovisores',
        'Triângulo de Sinalização',
        'Rádio VHF',
        'Condições do Cesto',
        'Mangueiras do Cesto',
        'Lança do Cesto',
        'Calços p/ Pneus',
        'Calços p/ Patolas',
        'Patolas'
    ],

    passeio: [
        'Buzina',
        'Luz de Ré',
        'Luz de Freio',
        'Setas',
        'Farol',
        'Freio de Mão',
        'Limpador de Para-brisa',
        'Esguicho',
        'Pneus',
        'Retrovisores',
        'Triângulo de Sinalização'
    ]
};

const secaoEPC = document.getElementById("secaoEPC");
const secaoVeiculo = document.getElementById("secaoVeiculo");
const checklistVeiculo = document.getElementById("checklistVeiculo");
const secaoColaboradores = document.getElementById("secaoColaboradores");

const tipoVeiculo = document.getElementById("tipoVeiculo");
const tituloVeiculo = document.getElementById("tituloVeiculo");
const listaVeiculo = document.getElementById("listaVeiculo");
const listaItens = document.getElementById("listaItens");
const placaVeiculo = document.getElementById("placaVeiculo");

const btnSalvar = document.getElementById("btnSalvar");
const statusEl = document.getElementById("status");

function setStatus(msg, tipo = "info"){
    statusEl.textContent = msg;
    statusEl.className = "status " + tipo;
}

function toggleNC(idLinha, valor){
    const linha = document.getElementById(idLinha);
    if (!linha) return;
    linha.style.display = valor === "Não Conforme" ? "table-row" : "none";
}

function montarLinhaChecklist(nomeGrupo, item, indice, idNC, categoria){
    return `
        <div class="item-card" data-grupo="${nomeGrupo}" data-item="${item}" data-categoria="${categoria}">
            <div class="item-title">${indice + 1} - ${item}</div>

            <div class="opcoes-grid">
                <div class="opcao-btn conforme">
                    <input
                        type="radio"
                        id="${nomeGrupo}_conforme"
                        name="${nomeGrupo}"
                        value="Conforme"
                        onchange="toggleNC('${idNC}', this.value)"
                    >
                    <label for="${nomeGrupo}_conforme">Conforme</label>
                </div>

                <div class="opcao-btn nao-conforme">
                    <input
                        type="radio"
                        id="${nomeGrupo}_nao_conforme"
                        name="${nomeGrupo}"
                        value="Não Conforme"
                        onchange="toggleNC('${idNC}', this.value)"
                    >
                    <label for="${nomeGrupo}_nao_conforme">Não Conforme</label>
                </div>

                <div class="opcao-btn falta">
                    <input
                        type="radio"
                        id="${nomeGrupo}_falta"
                        name="${nomeGrupo}"
                        value="Falta"
                        onchange="toggleNC('${idNC}', this.value)"
                    >
                    <label for="${nomeGrupo}_falta">Falta</label>
                </div>

                <div class="opcao-btn na">
                    <input
                        type="radio"
                        id="${nomeGrupo}_na"
                        name="${nomeGrupo}"
                        value="NA"
                        onchange="toggleNC('${idNC}', this.value)"
                    >
                    <label for="${nomeGrupo}_na">Não se Aplica</label>
                </div>
            </div>

            <div id="${idNC}" class="naoConformeBox">
                <div class="naoConformeContent">
                    <strong>Registro da Não Conformidade</strong>

                    <br><br>
                    Foto da não conformidade:
                    <br><br>

                    <input type="file" class="fotoNC" accept="image/*" capture="environment">

                    <br><br>
                    Observação:
                    <textarea class="obsNC" placeholder="Descreva a não conformidade..."></textarea>
                </div>
            </div>
        </div>
    `;
}

function adicionarTituloGrupo(titulo) {
    listaItens.innerHTML += `
        <tr class="grupo-linha">
            <td colspan="5">${titulo}</td>
        </tr>
    `;
}

function carregarChecklistEPC(){
    listaItens.innerHTML = "";

    // ===== EPI =====
    adicionarTituloGrupo("EPI");
    itensEPI.forEach((item, i) => {
        listaItens.innerHTML += montarLinhaChecklist(`epi${i}`, item, i, `nc_epi_${i}`, "EPI");
    });

    // ===== EPC =====
    adicionarTituloGrupo("EPC");
    itensEPC.forEach((item, i) => {
        listaItens.innerHTML += montarLinhaChecklist(`epc${i}`, item, i, `nc_epc_${i}`, "EPC");
    });
}

function carregarChecklistVeiculo(tipo){
    listaVeiculo.innerHTML = "";

    if (!veiculos[tipo]) return;

    veiculos[tipo].forEach((item, i) => {
        listaVeiculo.innerHTML += montarLinhaChecklist(`v${tipo}${i}`, item, i, `ncv${tipo}${i}`, "VEICULO");
    });
}

function getTipoInspecaoSelecionado() {
    const selecionado = document.querySelector('input[name="tipo"]:checked');
    return selecionado ? selecionado.value : "";
}

function coletarChecklistDoContainer(container) {
    const registros = [];
    const cards = container.querySelectorAll(".item-card");

    cards.forEach((card) => {
        const grupo = card.dataset.grupo;
        const item = card.dataset.item;
        const categoria = card.dataset.categoria;

        const selecionado = card.querySelector(`input[name="${grupo}"]:checked`);
        const status = selecionado ? selecionado.value : "";

        const obs = card.querySelector(".obsNC");
        const foto = card.querySelector(".fotoNC");

        const observacao = obs ? obs.value.trim() : "";
        const foto_nome = (foto && foto.files && foto.files[0]) ? foto.files[0].name : "";

        registros.push({
            categoria,
            grupo,
            item,
            status,
            observacao,
            foto_nome
        });
    });

    return registros;
}


function validarFormulario(payload) {
    if (!payload.data_inspecao) return "Informe a data da inspeção.";
    if (!payload.responsavel_1) return "Informe o Responsável 01.";
    if (!payload.matricula_1) return "Informe a matrícula do Responsável 01.";
    if (!payload.tipo_inspecao) return "Selecione o tipo de inspeção.";

    if (payload.tipo_inspecao === "epi" && !payload.matricula_colaborador_1) {
        return "Informe a matrícula do colaborador 01 para inspeção EPI/EPC.";
    }

    if (payload.tipo_inspecao === "viatura" && !payload.tipo_veiculo) {
        return "Selecione o tipo do veículo.";
    }

    return "";
}

async function salvarInspecao() {
    btnSalvar.disabled = true;
    setStatus("Salvando inspeção...", "info");

    try {
        const tipo_inspecao = getTipoInspecaoSelecionado();

        let checklist = [];
        
        if (tipo_inspecao === "epi") {
            checklist = coletarChecklistDoContainer(listaItens);
        } else if (tipo_inspecao === "viatura") {
            checklist = coletarChecklistDoContainer(listaVeiculo);
        }


        const payload = {
            data_inspecao: document.getElementById("dataInspecao").value,
            responsavel_1: document.getElementById("resp1").value.trim(),
            matricula_1: document.getElementById("mat1").value.trim(),
            responsavel_2: document.getElementById("resp2").value.trim(),
            matricula_2: document.getElementById("mat2").value.trim(),

            matricula_colaborador_1: document.getElementById("matColab1").value.trim(),
            matricula_colaborador_2: document.getElementById("matColab2").value.trim(),

            tipo_inspecao,
            placa_veiculo: document.getElementById("placaVeiculo").value.trim(),
            tipo_veiculo: document.getElementById("tipoVeiculo").value,
            checklist
        };

        const erroValidacao = validarFormulario(payload);
        if (erroValidacao) {
            setStatus(erroValidacao, "erro");
            return;
        }

        const r = await fetch(`${API}/salvar-form-inspecao`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const j = await r.json().catch(() => ({}));

        if (!r.ok) {
            console.error("Erro do Worker:", j);
            setStatus(
                (j.error || "Erro ao salvar inspeção.") +
                (j.detail ? " | " + j.detail : ""),
                "erro"
            );
            return;
        }

        // ✅ mensagem de sucesso
        setStatus("Formulário enviado com sucesso!", "ok");

        // ✅ limpa os campos principais
        document.getElementById("dataInspecao").value = "";
        document.getElementById("resp1").value = "";
        document.getElementById("mat1").value = "";
        document.getElementById("resp2").value = "";
        document.getElementById("mat2").value = "";
        document.getElementById("matColab1").value = "";
        document.getElementById("matColab2").value = "";
        document.getElementById("placaVeiculo").value = "";
        document.getElementById("tipoVeiculo").value = "";

        // ✅ desmarca o tipo de inspeção
        document.querySelectorAll('input[name="tipo"]').forEach(r => r.checked = false);

        // ✅ esconde seções
        secaoEPC.classList.add("hidden");
        secaoVeiculo.classList.add("hidden");
        checklistVeiculo.classList.add("hidden");
        secaoColaboradores.classList.add("hidden");

        // ✅ limpa checklist de veículo
        listaVeiculo.innerHTML = "";

        // ✅ recarrega checklist EPC limpo
        carregarChecklistEPC();

    } catch (err) {
        console.error(err);
        setStatus("Falha ao conectar ao servidor.", "erro");
    } finally {
        btnSalvar.disabled = false;
    }
}

document.querySelectorAll('input[name="tipo"]').forEach(radio => {
    radio.addEventListener("change", () => {
        if (radio.value === "epi" && radio.checked) {
            secaoEPC.classList.remove("hidden");
            secaoColaboradores.classList.remove("hidden");

            secaoVeiculo.classList.add("hidden");
            checklistVeiculo.classList.add("hidden");

            tipoVeiculo.value = "";
            listaVeiculo.innerHTML = "";
            document.getElementById("placaVeiculo").value = "";
        }

        if (radio.value === "viatura" && radio.checked) {
            secaoVeiculo.classList.remove("hidden");

            secaoEPC.classList.add("hidden");
            secaoColaboradores.classList.add("hidden");

            document.getElementById("matColab1").value = "";
            document.getElementById("matColab2").value = "";
        }
    });
});

tipoVeiculo.addEventListener("change", () => {
    const tipo = tipoVeiculo.value;

    if (!tipo) {
        checklistVeiculo.classList.add("hidden");
        listaVeiculo.innerHTML = "";
        return;
    }

    checklistVeiculo.classList.remove("hidden");
    tituloVeiculo.textContent = tipoVeiculo.options[tipoVeiculo.selectedIndex].text;
    carregarChecklistVeiculo(tipo);
});

placaVeiculo.addEventListener("input", () => {
    placaVeiculo.value = placaVeiculo.value.replace(/\s+/g, "").toUpperCase();
});

btnSalvar.addEventListener("click", salvarInspecao);

carregarChecklistEPC();
</script>

</body>
</html>
