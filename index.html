<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inspeção de Campo</title>

<style>
    :root{
        --energisa-blue:#0097CE;
        --energisa-blue-dark:#0079A8;
        --energisa-green:#00843D;
        --bg:#F3F5F7;
        --border:#D9E0E6;
        --text:#333;
        --danger:#D32F2F;
    }

    *{
        box-sizing:border-box;
    }

    body{
        font-family:Arial, Helvetica, sans-serif;
        background:var(--bg);
        margin:0;
        padding:20px;
        color:var(--text);
    }

    .container{
        max-width:1400px;
        margin:auto;
    }

    .header{
        background:linear-gradient(
            90deg,
            var(--energisa-blue),
            var(--energisa-green)
        );
        color:white;
        padding:20px 30px;
        border-radius:12px;
        margin-bottom:25px;
        box-shadow:0 4px 15px rgba(0,0,0,.15);
    }

    .header h1{
        margin:0;
        font-size:28px;
    }

    .header span{
        opacity:.9;
        font-size:14px;
    }

    .card{
        background:white;
        border-radius:12px;
        margin-bottom:20px;
        overflow:hidden;
        box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .card-title{
        background:var(--energisa-blue);
        color:white;
        padding:15px 20px;
        font-size:18px;
        font-weight:bold;
    }

    .card-body{
        padding:20px;
    }

    label{
        display:block;
        font-weight:600;
        margin-top:15px;
        margin-bottom:6px;
    }

    input[type=text],
    input[type=date],
    select,
    textarea{
        width:100%;
        padding:12px;
        border:1px solid var(--border);
        border-radius:8px;
        font-size:14px;
    }

    input:focus,
    select:focus,
    textarea:focus{
        outline:none;
        border-color:var(--energisa-blue);
        box-shadow:0 0 0 3px rgba(0,151,206,.15);
    }

    .radio-group{
        display:flex;
        gap:40px;
        flex-wrap:wrap;
        margin-top:10px;
    }

    .radio-group label{
        display:flex;
        align-items:center;
        gap:8px;
        cursor:pointer;
        font-weight:normal;
        margin:0;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    th{
        background:var(--energisa-blue);
        color:white;
        padding:14px;
        text-align:center;
        font-size:14px;
    }

    td{
        padding:12px;
        border-bottom:1px solid #eee;
        text-align:center;
    }

    td:first-child{
        text-align:left;
    }

    tbody tr:nth-child(odd){
        background:#FAFAFA;
    }

    tbody tr:hover{
        background:#F0F8FC;
    }

    input[type=radio]{
        width:18px;
        height:18px;
        accent-color:var(--energisa-green);
        cursor:pointer;
    }

    .naoConformeBox{
        display:none;
        background:#FFF5F5 !important;
    }

    .naoConformeContent{
        padding:20px;
        border-left:5px solid var(--danger);
        text-align:left;
    }

    .naoConformeContent strong{
        color:var(--danger);
    }

    input[type=file]{
        margin-top:10px;
    }

    textarea{
        min-height:90px;
        margin-top:10px;
    }

    .hidden{
        display:none;
    }

    .btn-container{
        text-align:center;
        margin-top:30px;
    }

    button{
        background:var(--energisa-green);
        color:white;
        border:none;
        border-radius:10px;
        padding:15px 40px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:.3s;
    }

    button:hover{
        background:#006B31;
        transform:translateY(-2px);
        box-shadow:0 4px 12px rgba(0,0,0,.15);
    }

    .required{
        color:red;
    }

    @media(max-width:768px){

        body{
            padding:10px;
        }

        .header h1{
            font-size:22px;
        }

        table{
            font-size:12px;
        }

        th,
        td{
            padding:8px;
        }

        .radio-group{
            flex-direction:column;
            gap:15px;
        }

        button{
            width:100%;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Inspeção de Campo</h1>
        <span>Checklist Operacional • Segurança • Veículos • EPI/EPC</span>
    </div>

<div class="card">

<h2>Inspeção de Campo</h2>

 <div class="card-title">
        Dados da Inspeção
    </div>
<input type="date">

<label>RESPONSÁVEL 01 PELA AÇÃO</label>
<input type="text">

<label>MATRÍCULA RESPONSÁVEL 01</label>
<input type="text">

<label>RESPONSÁVEL 02 PELA AÇÃO</label>
<input type="text">

<label>MATRÍCULA RESPONSÁVEL 02</label>
<input type="text">

</div>

<div class="card">

<h2>Tipo de Inspeção</h2>

<label>
    <input type="radio" name="tipo" value="epi">
    EPI / EPC
</label>

<br><br>

<label>
    <input type="radio" name="tipo" value="viatura">
    Viatura
</label>

    <div class="card hidden" id="secaoVeiculo">

    <h2>Dados do Veículo</h2>

    <label>Placa do Veículo</label>
    <input type="text" id="placaVeiculo"
           placeholder="ABC1D23">

    <label>Tipo do Veículo</label>

    <select id="tipoVeiculo">
        <option value="">Selecione...</option>

        <option value="simples">
            Caminhonete Simples
        </option>

        <option value="escada">
            Caminhonete Escada Central
        </option>

        <option value="cesto">
            Caminhão Cesto Aéreo
        </option>

        <option value="passeio">
            Carro Passeio / Motocicleta
        </option>

    </select>

</div>

<div class="card hidden" id="checklistVeiculo">

    <h2 id="tituloVeiculo"></h2>

    <table>

        <thead>

            <tr>
                <th>Item</th>
                <th>Conforme</th>
                <th>Não Conforme</th>
                <th>Falta</th>
                <th>Não se Aplica</th>
            </tr>

        </thead>

        <tbody id="listaVeiculo">

        </tbody>

    </table>

</div>

</div>

<div class="card hidden" id="secaoEPC">

<h2>EQUIPAMENTOS DE PROTEÇÃO COLETIVA - EPC</h2>

<table>

<thead>
<tr>
    <th>Item</th>
    <th>Conforme</th>
    <th>Não Conforme</th>
    <th>Falta</th>
    <th>Não se Aplica</th>
</tr>
</thead>

<tbody id="listaItens"></tbody>

</table>

</div>

<br>

<div class="btn-container">
    <button type="button">
        Salvar Inspeção
    </button>
</div>

<script>

const itens = [
'Bastão "Pega Tudo"',
'Bastão Podador',
'Vara de Manobra',
'Bay-pass 13,8 kV',
'Dispositivo Anti Queda',
'Cone de Sinalização',
'Aterramento BT',
'Aterramento MT',
'Detector de Tensão BT',
'Detector de Tensão MT',
'Dinamômetro',
'Escada Extensível',
'Escada Singela',
'Manta Isolante',
'Placa de Sinalização',
'Fita de Transposição'
];

    const veiculos = {

    simples: [

        'Buzina',
        'Chave de Roda',
        'Luz de Ré',
        'Luz de Freio',
        'Setas',
        'Farol',
        'Pneu de Estepe',
        'Freio de Mão',
        'Limpador de Para-brisa',
        'Esguicho',
        'Macaco',
        'Pneus',
        'Retrovisores',
        'Triângulo de Sinalização',
        'Rádio VHF',
        'Calços p/ Pneus'

    ],

    escada: [

        'Buzina',
        'Luz de Ré',
        'Luz de Freio',
        'Setas',
        'Farol',
        'Pneu de Estepe',
        'Freio de Mão',
        'Limpador de Para-brisa',
        'Esguicho',
        'Macaco',
        'Pneus',
        'Retrovisores',
        'Triângulo de Sinalização',
        'Rádio VHF',
        'Condições da Escada Central',
        'Mangueiras da Escada',
        'Calços p/ Pneus',
        'Calços p/ Patolas',
        'Patolas'

    ],

    cesto: [

        'Buzina',
        'Luz de Ré',
        'Luz de Freio',
        'Setas',
        'Farol',
        'Pneu de Estepe',
        'Freio de Mão',
        'Limpador de Para-brisa',
        'Esguicho',
        'Macaco',
        'Pneus',
        'Retrovisores',
        'Triângulo de Sinalização',
        'Rádio VHF',
        'Condições do Cesto',
        'Mangueiras do Cesto',
        'Lança do Cesto',
        'Calços p/ Pneus',
        'Calços p/ Patolas',
        'Patolas'

    ],

    passeio: [

        'Buzina',
        'Luz de Ré',
        'Luz de Freio',
        'Setas',
        'Farol',
        'Freio de Mão',
        'Limpador de Para-brisa',
        'Esguicho',
        'Pneus',
        'Retrovisores',
        'Triângulo de Sinalização'

    ]

};

const tbody = document.getElementById("listaItens");

itens.forEach((item, i)=>{

    tbody.innerHTML += `
    <tr>

        <td>${i+1} - ${item}</td>

        <td>
            <input type="radio" name="item${i}" value="Conforme">
        </td>

        <td>
            <input type="radio"
                   name="item${i}"
                   value="Não Conforme"
                   onchange="mostrarNC(${i})">
        </td>

        <td>
            <input type="radio" name="item${i}" value="Falta">
        </td>

        <td>
            <input type="radio" name="item${i}" value="NA">
        </td>

    </tr>

    <tr id="nc${i}" class="naoConformeBox">
    <td colspan="5">

        <div class="naoConformeContent">

            <strong>Registro da Não Conformidade</strong>

            <br><br>

            Foto da não conformidade:

            <br><br>

            <input type="file"
                   accept="image/*"
                   capture="environment">

            <br><br>

            Observação:

            <textarea
                placeholder="Descreva a não conformidade..."
            ></textarea>

        </td>

    </tr>
    `;
});

function mostrarNC(indice){

    document.getElementById("nc"+indice)
            .style.display = "table-row";
}
    function mostrarNCVeiculo(tipo,i){

    document.getElementById(
        `ncv${tipo}${i}`
    ).style.display="table-row";

}

document.querySelectorAll('input[name="tipo"]')
.forEach(radio=>{

    radio.addEventListener("change",()=>{

        if(radio.value==="epi" && radio.checked){

            secaoEPC.classList.remove("hidden");

            secaoVeiculo.classList.add("hidden");

            checklistVeiculo.classList.add("hidden");

        }

        if(radio.value==="viatura" && radio.checked){

            secaoVeiculo.classList.remove("hidden");

            secaoEPC.classList.add("hidden");

        }

    });

});
    tipoVeiculo.addEventListener("change",()=>{

    const tipo = tipoVeiculo.value;

    if(!tipo){

        checklistVeiculo.classList.add("hidden");

        return;

    }

    checklistVeiculo.classList.remove("hidden");

    tituloVeiculo.innerHTML =
        tipoVeiculo.options[
            tipoVeiculo.selectedIndex
        ].text;

    listaVeiculo.innerHTML="";

    veiculos[tipo].forEach((item,i)=>{

        listaVeiculo.innerHTML += `

        <tr>

            <td>${i+1} - ${item}</td>

            <td>
                <input type="radio"
                       name="v${tipo}${i}">
            </td>

            <td>
                <input type="radio"
                       name="v${tipo}${i}"
                       onchange="mostrarNCVeiculo('${tipo}',${i})">
            </td>

            <td>
                <input type="radio"
                       name="v${tipo}${i}">
            </td>

            <td>
                <input type="radio"
                       name="v${tipo}${i}">
            </td>

        </tr>

        <tr id="ncv${tipo}${i}"
            class="naoConformeBox">

            <td colspan="5">

                <strong>
                    Registro da Não Conformidade
                </strong>

                <br><br>

                Foto:

                <br><br>

                <input type="file"
                       accept="image/*"
                       capture="environment">

                <br><br>

                Observação:

                <textarea></textarea>

            </td>

        </tr>

        `;

    });

});

</script>

</body>
</html>
