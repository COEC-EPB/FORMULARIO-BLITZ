<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspeção de Campo</title>

<style>
    :root{
        --energisa-blue:#0097CE;
        --energisa-blue-dark:#0079A8;
        --energisa-green:#00843D;
        --bg:#F3F5F7;
        --border:#D9E0E6;
        --text:#333;
        --danger:#D32F2F;
        --white:#fff;
    }

    *{
        box-sizing:border-box;
    }

    body{
        font-family:Arial, Helvetica, sans-serif;
        background:var(--bg);
        margin:0;
        padding:20px;
        color:var(--text);
    }

    .container{
        max-width:1400px;
        margin:auto;
    }

    .header{
        background: linear-gradient(135deg, var(--energisa-blue), var(--energisa-blue-dark));
        color:white;
        padding:20px 30px;
        border-radius:12px;
        margin-bottom:25px;
        box-shadow:0 4px 15px rgba(0,0,0,.15);
    }

    .header h1{
        margin:0;
        font-size:28px;
    }

    .header span{
        opacity:.9;
        font-size:14px;
    }

    .card{
        background:white;
        border-radius:12px;
        margin-bottom:20px;
        overflow:hidden;
        box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .card-title{
        background:var(--energisa-blue);
        color:white;
        padding:15px 20px;
        font-size:18px;
        font-weight:bold;
    }

    .card-body{
        padding:20px;
    }

    .grid{
        display:grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap:16px;
    }

    .full{
        grid-column:1 / -1;
    }

    label{
        display:block;
        font-weight:600;
        margin-bottom:6px;
    }

    .field{
        display:flex;
        flex-direction:column;
    }

    input[type=text],
    input[type=date],
    select,
    textarea{
        width:100%;
        padding:12px;
        border:1px solid var(--border);
        border-radius:8px;
        font-size:14px;
    }

    input:focus,
    select:focus,
    textarea:focus{
        outline:none;
        border-color:var(--energisa-blue);
        box-shadow:0 0 0 3px rgba(0,151,206,.15);
    }

    .radio-group{
        display:flex;
        gap:30px;
        flex-wrap:wrap;
        margin-top:10px;
    }

    .radio-group label{
        display:flex;
        align-items:center;
        gap:8px;
        cursor:pointer;
        font-weight:normal;
        margin:0;
    }

    .table-container{
        overflow:auto;
        width:100%;
    }

    table{
        width:100%;
        border-collapse:collapse;
        min-width:800px;
    }

    thead{
        position:sticky;
        top:0;
        z-index:10;
    }

    th{
        background:var(--energisa-blue);
        color:white;
        padding:14px;
        text-align:center;
        font-size:14px;
    }

    td{
        padding:12px;
        border-bottom:1px solid #eee;
        text-align:center;
        vertical-align:middle;
    }

    td:first-child{
        text-align:left;
    }

    tbody tr:nth-child(odd){
        background:#FAFAFA;
    }

    tbody tr:hover{
        background:#F0F8FC;
    }

    input[type=radio]{
        width:22px;
        height:22px;
        accent-color:var(--energisa-green);
        transform:scale(1.05);
        cursor:pointer;
    }

    .naoConformeBox{
        display:none;
        background:#FFF5F5 !important;
    }

    .naoConformeContent{
        padding:20px;
        border-left:5px solid var(--danger);
        text-align:left;
    }

    .naoConformeContent strong{
        color:var(--danger);
    }

    input[type=file]{
        margin-top:10px;
    }

    textarea{
        min-height:90px;
        margin-top:10px;
        resize:vertical;
    }

    .hidden{
        display:none;
    }

    .btn-container{
        text-align:center;
        margin-top:30px;
    }

    button{
        background:var(--energisa-blue);
        color:white;
        border:none;
        border-radius:10px;
        padding:15px 40px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:.3s;
    }

    button:hover{
        background:var(--energisa-blue-dark);
        transform:translateY(-2px);
        box-shadow:0 4px 12px rgba(0,0,0,.15);
    }

    .required{
        color:red;
    }

    h2{
        margin:0 0 16px 0;
        font-size:20px;
        color:#1f2937;
    }

    @media(max-width:768px){
        body{
            padding:10px;
        }

        .header h1{
            font-size:22px;
        }

        .grid{
            grid-template-columns:1fr;
        }

        .radio-group{
            flex-direction:column;
            gap:15px;
        }

        button{
            width:100%;
        }

        th, td{
            padding:10px 8px;
            font-size:13px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Inspeção de Campo</h1>
        <span>Checklist Operacional • Segurança • Veículos • EPI/EPC</span>
    </div>

    <!-- DADOS DA INSPEÇÃO -->
    <div class="card">
        <div class="card-title">Dados da Inspeção</div>
        <div class="card-body">
            <div class="grid">
                <div class="field">
                    <label for="dataInspecao">Data da Inspeção <span class="required">*</span></label>
                    <input type="date" id="dataInspecao">
                </div>

                <div class="field">
                    <label for="resp1">Responsável 01 pela ação <span class="required">*</span></label>
                    <input type="text" id="resp1">
                </div>

                <div class="field">
                    <label for="mat1">Matrícula Responsável 01 <span class="required">*</span></label>
                    <input type="text" id="mat1">
                </div>

                <div class="field">
                    <label for="resp2">Responsável 02 pela ação</label>
                    <input type="text" id="resp2">
                </div>

                <div class="field">
                    <label for="mat2">Matrícula Responsável 02</label>
                    <input type="text" id="mat2">
                </div>
            </div>
        </div>
    </div>

    <!-- TIPO DE INSPEÇÃO -->
    <div class="card">
        <div class="card-title">Tipo de Inspeção</div>
        <div class="card-body">
            <div class="radio-group">
                <label>
                    <input type="radio" name="tipo" value="epi">
                    EPI / EPC
                </label>

                <label>
                    <input type="radio" name="tipo" value="viatura">
                    Viatura
                </label>
            </div>
        </div>
    </div>

    <!-- DADOS DO VEÍCULO -->
    <div class="card hidden" id="secaoVeiculo">
        <div class="card-title">Dados do Veículo</div>
        <div class="card-body">
            <div class="grid">
                <div class="field">
                    <label for="placaVeiculo">Placa do Veículo</label>
                    <input
                        type="text"
                        id="placaVeiculo"
                        maxlength="7"
                        placeholder="ABC1D23"
                    >
                </div>

                <div class="field">
                    <label for="tipoVeiculo">Tipo do Veículo</label>
                    <select id="tipoVeiculo">
                        <option value="">Selecione...</option>
                        <option value="simples">Caminhonete Simples</option>
                        <option value="escada">Caminhonete Escada Central</option>
                        <option value="cesto">Caminhão Cesto Aéreo</option>
                        <option value="passeio">Carro Passeio / Motocicleta</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- CHECKLIST VEÍCULO -->
    <div class="card hidden" id="checklistVeiculo">
        <div class="card-title" id="tituloVeiculo">Checklist do Veículo</div>
        <div class="card-body">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Conforme</th>
                            <th>Não Conforme</th>
                            <th>Falta</th>
                            <th>Não se Aplica</th>
                        </tr>
                    </thead>
                    <tbody id="listaVeiculo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- CHECKLIST EPC -->
    <div class="card hidden" id="secaoEPC">
        <div class="card-title">Equipamentos de Proteção Coletiva - EPC</div>
        <div class="card-body">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Conforme</th>
                            <th>Não Conforme</th>
                            <th>Falta</th>
                            <th>Não se Aplica</th>
                        </tr>
                    </thead>
                    <tbody id="listaItens"></tbody>
